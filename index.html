<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMAPA — sistema de puntos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="panel">
      <h1>AMAPA</h1>
      <p>Sistema de nodos móviles
      </p>

      <div class="controles">
        <fieldset class="grupo-controles">
          <legend>Movimiento</legend>

          <label class="campo">
            Modo
            <select id="modoMovimiento">
              <option value="organico">Orgánico</option>
              <option value="onda">Onda</option>
              <option value="pulso">Pulso</option>
              <option value="temblor">Temblor</option>
            </select>
          </label>

          <label class="switch">
            <input id="autoMovimiento" type="checkbox" checked />
            <span></span>
            Play/Pausa
          </label>

          <label>
            Velocidad
            <input id="velocidad" type="range" min="1" max="80" value="20" />
          </label>

          <label>
            Movimiento
            <input id="movimiento" type="range" min="0" max="40" value="10" />
          </label>
        </fieldset>

        <fieldset class="grupo-controles">
          <legend>Forma</legend>

          <label class="switch">
            <input id="conectarLetras" type="checkbox" />
            <span></span>
            Conectar letras
          </label>

          <label class="switch">
            <input id="curvas" type="checkbox" checked />
            <span></span>
            Curvas
          </label>

          <label>
            Separación
            <input id="separacion" type="range" min="18" max="95" value="44" />
          </label>

          <label>
            Longitud curva
            <input id="variacionLineas" type="range" min="0" max="120" value="54" />
          </label>
        </fieldset>

        <fieldset class="grupo-controles">
          <legend>Apariencia</legend>

          <label>
            Tamaño punto
            <input id="tamanoPunto" type="range" min="2" max="20" value="8" />
          </label>

          <label class="campo-color">
            Color puntos
            <input id="colorPunto" type="color" value="#8a8a8a" />
          </label>

          <label>
            Grosor línea
            <input id="grosorLinea" type="range" min="1" max="14" value="3" />
          </label>

          <label class="campo-color">
            Color líneas
            <input id="colorLinea" type="color" value="#111111" />
          </label>
        </fieldset>

        <div class="acciones">
          <button id="descargarSvg" class="boton-exportar" type="button">
            Descargar SVG actual
          </button>
        </div>
      </div>
    </section>

    <canvas id="canvas"></canvas>
  </main>

  <script src="script.js"></script>
</body>
</html>
