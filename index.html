<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMAPA — sistema de puntos</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <section class="panel">
      <h1>AMAPA</h1>
      <p>Sistema de nodos móviles
      </p>

      <div class="selector-modo" aria-label="Cambiar modo">
        <button class="modo-boton activo" type="button" data-modo="amapa">AMAPA</button>
        <button class="modo-boton" type="button" data-modo="personajes">PERSONAJES</button>
        <button class="modo-boton" type="button" data-modo="ambos">AMBOS</button>
      </div>

      <div class="controles controles-compartidos">
        <fieldset class="grupo-controles">
          <legend>Movimiento</legend>

          <label class="campo">
            Modo
            <select id="modoMovimiento">
              <option value="organico">Orgánico</option>
              <option value="onda">Onda</option>
              <option value="pulso">Pulso</option>
              <option value="temblor">Temblor</option>
            </select>
          </label>

          <label class="switch">
            <input id="autoMovimiento" type="checkbox" checked />
            <span></span>
            Play/Pausa
          </label>

          <label>
            Velocidad
            <input id="velocidad" type="range" min="1" max="80" value="20" />
          </label>

          <label>
            Movimiento
            <input id="movimiento" type="range" min="0" max="40" value="10" />
          </label>
        </fieldset>
      </div>

      <div id="controlesAmapa" class="controles controles-modo activa">
        <fieldset class="grupo-controles">
          <legend>Forma</legend>

          <label class="switch">
            <input id="conectarLetras" type="checkbox" />
            <span></span>
            Conectar letras
          </label>

          <label class="switch">
            <input id="curvas" type="checkbox" checked />
            <span></span>
            Curvas
          </label>

          <label>
            Separación
            <input id="separacion" type="range" min="18" max="95" value="44" />
          </label>

          <label>
            Longitud curva
            <input id="variacionLineas" type="range" min="0" max="120" value="54" />
          </label>
        </fieldset>

      </div>

      <div id="controlesPersonajes" class="controles controles-modo">
        <fieldset class="grupo-controles">
          <legend>Forma</legend>

          <label>
            Gravedad
            <input id="gravedadPersonaje" type="range" min="-100" max="100" value="0" />
          </label>

          <label>
            Doblar tabla
            <input id="doblarTablaPersonaje" type="range" min="-100" max="100" value="0" />
          </label>

          <label class="switch">
            <input id="cabezaDelineadaPersonaje" type="checkbox" />
            <span></span>
            Delinear nodos
          </label>

          <button id="randomPersonaje" class="boton-exportar" type="button">Random</button>
        </fieldset>
      </div>

      <div class="controles controles-compartidos">
        <fieldset class="grupo-controles">
          <legend>Apariencia</legend>

          <label>
            Tamaño punto
            <input id="tamanoPunto" type="range" min="2" max="20" value="8" />
          </label>

          <label class="campo-color">
            Color puntos
            <input id="colorPunto" type="color" value="#8a8a8a" />
          </label>

          <label>
            Grosor línea
            <input id="grosorLinea" type="range" min="1" max="14" value="3" />
          </label>

          <label class="campo-color">
            Color líneas
            <input id="colorLinea" type="color" value="#111111" />
          </label>
        </fieldset>
      </div>

      <div class="acciones acciones-descarga">
        <button id="descargarSvg" class="boton-exportar" type="button">
          Descargar SVG actual
        </button>
      </div>
    </section>

    <section class="lienzos">
      <canvas id="canvas" class="lienzo-modo activo"></canvas>
      <canvas id="canvasPersonaje" class="lienzo-modo"></canvas>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="personajes.js"></script>
  <script src="modo.js"></script>
</body>
</html>
